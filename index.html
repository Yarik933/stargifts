		<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
        <title>StarGifts</title>
        
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script>
            window.tgInitData = "";
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    var initDataString = window.Telegram.WebApp.initData || "";
                    window.tgInitData = initDataString;
                }
            } catch(e) {
                console.error("TG Init Error:", e);
            }
        </script>

        <style>
            html, body, #canvas {
                margin: 0;
                padding: 0;
                border: 0;
            }

            body {
                color: white;
                background-color: #1a1a1a !important;
                overflow: hidden;
                touch-action: none;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                width: 100vw;
                height: 100vh;
            }

            #canvas {
                display: block;
                position: relative;
                z-index: 1;
            }

            #canvas:focus {
                outline: none;
            }

            #status, #status-splash, .godot, #status-notice {
                display: none !important;
                visibility: hidden !important;
            }

            #custom-loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: #1a1a1a;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .loader-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                transition: opacity 0.3s ease;
            }

            .loader-title {
                color: #ffffff;
                font-size: 32px;
                font-weight: bold;
                letter-spacing: 1px;
                margin-bottom: 12px;
            }

            .loader-percentage {
                color: rgba(255, 255, 255, 0.6);
                font-size: 18px;
                font-weight: 500;
                min-height: 24px;
                margin-bottom: 8px;
            }

            .loader-version {
                color: rgba(255, 255, 255, 0.35);
                font-size: 13px;
                font-weight: 400;
                letter-spacing: 0.5px;
            }
        </style>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const loaderDiv = document.createElement("div");
                loaderDiv.id = "custom-loading-screen";
                loaderDiv.innerHTML = `
                    <div class="loader-content" id="loader-ui">
                        <div class="loader-title">StarGifts</div>
                        <div class="loader-percentage" id="loading-pct">Загрузка: 0%</div>
                        <div class="loader-version">Версия 1.0.0 Бета 5</div>
                    </div>
                `;
                document.body.appendChild(loaderDiv);

                const pctText = document.getElementById("loading-pct");
                const loaderUi = document.getElementById("loader-ui");
                let isFullyLoaded = false;

                const originalFetch = window.fetch;
                window.fetch = async function(...args) {
                    const response = await originalFetch(...args);
                    const url = args[0] || "";
                    
                    if (typeof url === "string" && url.endsWith(".pck")) {
                        const reader = response.clone().body.getReader();
                        const contentLength = +response.headers.get('Content-Length') || 0;
                        let receivedLength = 0;

                        (async () => {
                            while(true) {
                                const {done, value} = await reader.read();
                                if (done) break;
                                receivedLength += value.length;
                                if (contentLength > 0) {
                                    const pct = Math.round((receivedLength / contentLength) * 100);
                                    if (pctText && !isFullyLoaded) pctText.innerText = `Загрузка: ${pct}%`;
                                }
                            }
                        })();
                    }
                    return response;
                };

                const checkCanvasActive = setInterval(() => {
                    const canvas = document.getElementById("canvas");
                    
                    if (canvas && canvas.style.display !== "none" && canvas.width > 0) {
                        if (!isFullyLoaded) {
                            isFullyLoaded = true;
                            if (pctText) {
                                pctText.innerText = "Проверка аккаунта и загрузка приложения...";
                                pctText.style.color = "#ffffff";
                            }
                        }

                        try {
                            const gl = canvas.getContext("webgl2") || canvas.getContext("webgl");
                            if (gl) {
                                const pixel = new Uint8Array(4);
                                gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);
                                
                                if (pixel[3] > 0 || pixel[0] > 0 || pixel[1] > 0 || pixel[2] > 0) {
                                    clearInterval(checkCanvasActive);
                                    
                                    if (loaderUi) loaderUi.style.opacity = "0";
                                    
                                    setTimeout(() => {
                                        loaderDiv.style.opacity = "0";
                                        setTimeout(() => loaderDiv.remove(), 600);
                                    }, 200);
                                }
                            }
                        } catch (e) {
                            setTimeout(() => {
                                clearInterval(checkCanvasActive);
                                loaderDiv.remove();
                            }, 2500);
                        }
                    }
                }, 100);
            });
        </script>
    </head>
    <body>
        <canvas id="canvas">
            Your browser does not support the canvas tag.
        </canvas>

        <noscript>
            Your browser does not support JavaScript.
        </noscript>

        <div id="status">
            <img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
            <progress id="status-progress"></progress>
            <div id="status-notice"></div>
        </div>

        <script src="index.js"></script>
        <script>
            const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":true,"fileSizes":{"index.pck":82068,"index.wasm":37686550},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
            const GODOT_THREADS_ENABLED = false;
            const engine = new Engine(GODOT_CONFIG);

            (function () {
                const statusOverlay = document.getElementById('status');
                const statusProgress = document.getElementById('status-progress');
                const statusNotice = document.getElementById('status-notice');

                let initializing = true;
                let statusMode = '';

                function setStatusMode(mode) {
                    if (statusMode === mode || !initializing) {
                        return;
                    }
                    if (mode === 'hidden') {
                        statusOverlay.remove();
                        initializing = false;
                        return;
                    }
                    statusOverlay.style.visibility = 'visible';
                    statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                    statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                    statusMode = mode;
                }

                function setStatusNotice(text) {
                    while (statusNotice.lastChild) {
                        statusNotice.removeChild(statusNotice.lastChild);
                    }
                    const lines = text.split('\n');
                    lines.forEach((line) => {
                        statusNotice.appendChild(document.createTextNode(line));
                        statusNotice.appendChild(document.createElement('br'));
                    });
                }

                function displayFailureNotice(err) {
                    console.error(err);
                    if (err instanceof Error) {
                        setStatusNotice(err.message);
                    } else if (typeof err === 'string') {
                        setStatusNotice(err);
                    } else {
                        setStatusNotice('An unknown error occurred.');
                    }
                    setStatusMode('notice');
                    initializing = false;
                }

                const missing = Engine.getMissingFeatures({
                    threads: GODOT_THREADS_ENABLED,
                });

                if (missing.length !== 0) {
                    if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
                        let serviceWorkerRegistrationPromise;
                        try {
                            serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
                        } catch (err) {
                            serviceWorkerRegistrationPromise = Promise.reject(new Error('Регистрация сервиса не удалась.'));
                        }
                        Promise.race([
                            serviceWorkerRegistrationPromise.then((registration) => {
                                if (registration != null) {
                                    return Promise.reject(new Error('Этот сервис обработчик уже существует.'));
                                }
                                return registration;
                            }).then(() => engine.installServiceWorker()),
                            new Promise((resolve) => {
                                setTimeout(() => resolve(), 2000);
                            }),
                        ]).then(() => {
                            window.location.reload();
                        }).catch((err) => {
                            console.error('Произошла ошибка пока была регистрация системы:', err);
                        });
                    } else {
                        const missingMsg = 'Error\nРесурсы для работы StarGifts платформы были нарушены или не обработаны:\n';
                        displayFailureNotice(missingMsg + missing.join('\n'));
                    }
                } else {
                    setStatusMode('progress');
                    engine.startGame({
                        'onProgress': function (current, total) {
                            if (current > 0 && total > 0) {
                                statusProgress.value = current;
                                statusProgress.max = total;
                            } else {
                                statusProgress.removeAttribute('value');
                                statusProgress.removeAttribute('max');
                            }
                        },
                    }).then(() => {
                        setStatusMode('hidden');
                    }, displayFailureNotice);
                }
            }());
        </script>
    </body>
</html>
